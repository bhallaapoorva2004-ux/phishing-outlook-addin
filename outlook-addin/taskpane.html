<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=Edge" />
<title>Phishing URL Checker</title>
<link rel="stylesheet" href="https://appsforoffice.microsoft.com/lib/1/hosted/office.css" />
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<link rel="stylesheet" href="taskpane.css" />
</head>
<body class="ms-font-m">

  <div class="app">
    <header class="app__header">
      <span class="brand__mark" id="statusMark">●</span>
      <span class="brand__name">Phishing Checker</span>
    </header>

    <section class="config">
      <label for="streamlitUrl">Your Streamlit app URL</label>
      <div class="config__row">
        <input id="streamlitUrl" type="url" placeholder="https://your-app-name.streamlit.app" />
        <button id="saveUrlBtn">Save</button>
      </div>
      <p class="config__status" id="configStatus"></p>
    </section>

    <section class="actions">
      <button class="btn btn--primary" id="scanBtn">Scan links in this email</button>
    </section>

    <section class="results" id="results">
      <p class="empty" id="emptyState">Open an email and click "Scan links in this email" to begin.</p>
    </section>
  </div>

  <script src="taskpane.js"></script>
</body>
</html>
