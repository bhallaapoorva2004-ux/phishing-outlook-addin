<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Phishing URL Checker — Settings</title>
<style>
  body {
    background: #0b1220;
    color: #e8edf5;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    max-width: 420px;
    margin: 40px auto;
    padding: 0 20px;
  }
  h1 { font-size: 16px; margin-bottom: 4px; }
  p.sub { color: #7c8aa8; font-size: 12.5px; margin-top: 0; line-height: 1.5; }
  label { font-size: 12px; color: #7c8aa8; display: block; margin: 16px 0 6px; }
  input {
    width: 100%;
    padding: 9px 10px;
    border-radius: 8px;
    border: 1px solid #233045;
    background: #121b2e;
    color: #e8edf5;
    font-size: 13px;
  }
  input:focus { outline: none; border-color: #5b8cff; }
  button {
    margin-top: 14px;
    padding: 9px 16px;
    border: none;
    border-radius: 8px;
    background: #5b8cff;
    color: #0b1220;
    font-weight: 700;
    cursor: pointer;
    font-size: 13px;
  }
  #status { font-size: 12px; margin-top: 10px; color: #34d399; min-height: 14px; }
</style>
</head>
<body>
  <h1>Phishing URL Checker — Settings</h1>
  <p class="sub">
    Paste the web address of your deployed Streamlit app (the Phishing
    Detection System). The extension will send the current tab's URL to this
    address as a query parameter when you click "Run full AI scan".
  </p>

  <label for="streamlitUrl">Streamlit app URL</label>
  <input id="streamlitUrl" type="url" placeholder="https://your-app-name.streamlit.app" />

  <button id="saveBtn">Save</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
